services:
  - type: web
    name: tonnie-roofing
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 0
      - key: CLOUDINARY_CLOUD_NAME
        sync: false  # Set this in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false  # Set this in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false  # Set this in Render dashboard
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false  # Set this in Render dashboard
      - key: ADMIN_USERNAME
        value: antony
      - key: ADMIN_EMAIL
        value: antonymutie7@gmail.com
      - key: MAX_ADMINS
        value: 2
      - key: PYTHONUNBUFFERED
        value: true
    autoDeploy: true
    healthCheckPath: /
    domains:
      - tonnieroofing.onrender.com